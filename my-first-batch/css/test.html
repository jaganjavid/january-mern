<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>


    <style>
        .box-1{
            width: 300px;
            height: 300px;
            background-color: blue;
            position: relative;
        }

        .box-2{
            width: 200px;
            height: 200px;
            background-color: green;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .box-3{
            width: 100px;
            height: 100px;
            background-color: aqua;  
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);

        }
    </style>


</head>
<body>
    <div class="box-1">
        <div class="box-2">
            <div class="box-3">

            </div>
        </div>
    </div>
</body>
</html>
